<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>The (un)Slop Game</title>
<style>
  :root{
    --cream:#f6f1e6; --paper:#fbf8f0; --ink:#1c1a17; --muted:#6b655a;
    --red:#df4636; --line:#d9d1bf; --shadow:0 10px 30px rgba(40,30,10,.12);
    --serif:Georgia,'Times New Roman',serif;
    --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--cream);color:var(--ink);
    font-family:var(--serif);font-size:17px;line-height:1.5;-webkit-text-size-adjust:100%}
  body{padding:0;min-height:100vh}
  .wrap{max-width:1080px;margin:0 auto;padding:18px 16px 80px}
  h1,h2,h3{font-weight:700;letter-spacing:.2px}
  a{color:var(--red)}
  .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .muted{color:var(--muted)}
  .red{color:var(--red)}
  .center{text-align:center}
  button{font-family:var(--serif);font-size:16px;cursor:pointer;border:1px solid var(--ink);
    background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;transition:.12s}
  button:hover{transform:translateY(-1px)}
  button.ghost{background:transparent;color:var(--ink)}
  button.red{background:var(--red);border-color:var(--red);color:var(--paper)}
  button.sm{padding:6px 12px;font-size:14px;border-radius:6px}
  button:disabled{opacity:.4;cursor:not-allowed;transform:none}
  input,textarea{font-family:var(--serif);font-size:16px;width:100%;padding:11px 12px;
    border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink)}
  textarea{resize:vertical;min-height:120px;line-height:1.55}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .col{display:flex;flex-direction:column;gap:10px}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .pill{display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:.1em;
    border:1px solid var(--line);border-radius:999px;padding:3px 10px;background:var(--paper)}
  .code{font-family:var(--mono);font-size:34px;letter-spacing:.35em;font-weight:700;color:var(--ink)}
  .seed{font-family:var(--serif);font-style:italic;font-size:20px;border-left:3px solid var(--red);padding-left:14px}
  .grid{display:grid;gap:14px}
  .split{display:grid;gap:16px;grid-template-columns:minmax(280px,380px) 1fr;align-items:start}
  @media(max-width:720px){ .split{grid-template-columns:1fr} .cardwrap{max-width:100%} }
  .players{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;font-size:14px}
  .dot{width:9px;height:9px;border-radius:50%;background:#bbb;display:inline-block}
  .dot.on{background:#3fae5a}.dot.ready{background:var(--red)}
  /* ---- card ---- */
  .card{position:relative;background:var(--paper);border:1.5px solid #34302a;border-radius:12px;
    overflow:hidden;box-shadow:var(--shadow)}
  .card .eng{position:absolute;inset:0;background:url('assets/engine.png') center/125% no-repeat;
    opacity:.05;pointer-events:none;mix-blend-mode:multiply}
  .card .cbody{position:relative;padding:20px 20px 22px}
  .ctop{display:flex;justify-content:space-between;align-items:center}
  .cname{font-family:var(--serif);font-size:30px;font-weight:700;margin:2px 0 12px}
  .csec{border-top:1px dashed var(--line);margin-top:12px;padding-top:10px}
  .cfield{margin:6px 0}
  .cfield em{color:var(--muted);font-style:italic;display:block;font-size:15px}
  .skill{margin:8px 0}
  .skill .k{color:var(--red);font-style:italic;font-weight:700}
  .caction{margin-top:14px;border-top:1px dashed var(--line);padding-top:10px;font-size:15px}
  .cimg{display:block;width:100%;height:auto;border-radius:12px;border:1.5px solid #34302a;box-shadow:var(--shadow)}
  .cardwrap{max-width:420px}
  /* ---- roomy two-panel card ---- */
  .card2{position:relative;background:var(--paper);border:2.5px solid #34302a;border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .card2.slop{border-color:#d0563f}
  .card2.unslop{border-color:#2f7d78}
  .card2 .eng{position:absolute;inset:0;background:url('assets/engine.png') center/135% no-repeat;opacity:.045;pointer-events:none;mix-blend-mode:multiply}
  .faceTag{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:999px}
  .faceTag.slop{color:#b8462f;border:1px solid #e0b3a6}
  .faceTag.unslop{color:#276b66;border:1px solid #a9cfcb}
  .card2 .cbody{position:relative;padding:22px 26px 24px}
  .card2 .cname{font-family:var(--serif);font-size:32px;font-weight:700;margin:4px 0 6px;line-height:1.1}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:8px}
  .panels .pane>.csec:first-child{border-top:none;margin-top:2px;padding-top:0}
  .card2 .cfield{margin:6px 0;font-size:16px;line-height:1.55}
  .card2 .skill{margin:10px 0}
  .cardfull{max-width:820px;margin:0 auto}
  @media(max-width:640px){ .panels{grid-template-columns:1fr;gap:8px} .card2 .cname{font-size:26px} }
  /* landing hero — the machine as a large unframed image above the title */
  .landing{position:relative;text-align:center}
  .landing .machinebg{display:block;width:min(600px,92vw);margin:-6px auto -10px;opacity:.96;
    -webkit-mask-image:radial-gradient(125% 108% at 50% 46%, #000 70%, transparent 93%);
    mask-image:radial-gradient(125% 108% at 50% 46%, #000 70%, transparent 93%)}
  .landing .fg{position:relative;z-index:1}
  /* credits / background block */
  .credits{max-width:720px;margin:30px auto 0}
  .credits .cgrid{display:grid;grid-template-columns:250px 1fr;gap:18px;align-items:center;text-align:left}
  @media(max-width:600px){ .credits .cgrid{grid-template-columns:1fr} }
  .talk-thumb{position:relative;display:block;border-radius:10px;overflow:hidden;border:1px solid var(--line);line-height:0}
  .talk-thumb img{width:100%;display:block;transition:.15s}
  .talk-thumb.thumb-fallback{min-height:150px;background:var(--cream) url('assets/engine.png') center/150% no-repeat}
  .talk-thumb:hover img{transform:scale(1.03)}
  .talk-thumb .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .talk-thumb .play i{width:50px;height:50px;border-radius:50%;background:rgba(223,70,54,.94);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.28)}
  .talk-thumb .play i::after{content:'';border-left:15px solid #fff;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:4px}
  .iconrow{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
  .iconrow a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--ink);font-size:14px}
  .iconrow a:hover{color:var(--red)}
  .iconrow svg{color:var(--red);flex:none}
  .closing-accent{border-left:3px solid var(--red)}
  /* sheet */
  .sheet{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px}
  .sheet .content{font-size:18px;line-height:1.6;white-space:pre-wrap;min-height:40px}
  .trail{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
  .note{font-size:14px;padding:8px 10px;border-left:3px solid var(--line);margin:8px 0;background:#fdfbf5}
  .note.act{border-color:var(--red)}
  .note .who{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--muted)}
  .toolbar{position:sticky;top:0;z-index:50;background:rgba(246,241,230,.94);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);margin:-18px -16px 16px;padding:10px 16px}
  .toolbar .row{justify-content:space-between}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .clock{font-family:var(--mono);font-size:22px;font-weight:700}
  .big{font-size:22px}
  .stack>*+*{margin-top:14px}
  .hidden{display:none}
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mini{cursor:pointer;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper);
    transition:.12s;position:relative}
  .mini:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .mini img{width:100%;display:block}
  .mini .cap{padding:6px 8px;font-size:12px;text-align:center}
  .flash{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:10px 18px;border-radius:8px;font-size:14px;opacity:0;transition:.3s;z-index:99}
  .flash.show{opacity:1}
  .tabbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,16,8,.5);display:flex;align-items:center;justify-content:center;z-index:80;padding:16px}
  .modal{background:var(--paper);border-radius:14px;max-width:520px;width:100%;max-height:90vh;overflow:auto;padding:20px;box-shadow:var(--shadow)}
  .modal.wide{max-width:920px}
  @media(max-width:640px){ .code{font-size:26px} .cname{font-size:25px} body{font-size:16px} }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="flash" id="flash"></div>

<script src="app.js"></script>
</body>
</html>
